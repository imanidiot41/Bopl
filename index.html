<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ MINI BOPL ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        .game-container {
            background: #10131f;
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        canvas {
            display: block;
            width: 1000px;
            height: 600px;
            border-radius: 1.5rem;
            background: radial-gradient(circle at 30% 20%, #26334d, #141a28);
            box-shadow: inset 0 0 40px #00000055, 0 8px 0 #0b0e14;
            cursor: none;
            touch-action: none;  /* prevent scrolling on touch */
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 8px 4px 8px;
            color: #e3e9ff;
            text-shadow: 0 2px 3px black;
            font-weight: bold;
        }

        .ability-panel {
            background: #1e2338;
            padding: 8px 20px;
            border-radius: 60px;
            box-shadow: inset 0 2px 5px #0b0e1a, 0 4px 0 #0c0f18;
            border-bottom: 2px solid #3f4b70;
            display: flex;
            gap: 20px;
        }

        .ability-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ability-key {
            background: #2f3b5c;
            color: #b7c9ff;
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: inset 0 1px 3px black, 0 2px 0 #121725;
        }

        .ability-name {
            font-size: 1rem;
            letter-spacing: 1px;
            color: #ffde9e;
        }

        .cooldown-bar {
            width: 60px;
            height: 8px;
            background: #1a1e30;
            border-radius: 10px;
            margin-top: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px black;
        }

        .cooldown-fill {
            height: 100%;
            width: 100%;
            background: #6ef0b0;
            border-radius: 10px;
            transition: width 0.05s linear;
            box-shadow: 0 0 6px #6ef0b0aa;
        }

        .restart-btn {
            background: #ffb347;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 40px;
            box-shadow: 0 5px 0 #b45f06, 0 2px 10px orange;
            color: #1a1f2f;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #ffe6b0;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b45f06, 0 2px 8px orange;
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .start-screen, .win-screen {
            position: absolute;
            background: #1a1f2fd9;
            backdrop-filter: blur(8px);
            padding: 40px 60px;
            border-radius: 60px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 30px black, inset 0 0 0 2px #6e85c0;
            pointer-events: auto;
            border-bottom: 6px solid #ffb347;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffe694, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 8px 0 #7f3f00;
            letter-spacing: 4px;
        }

        .controls-hint {
            margin: 20px 0;
            color: #ccd9ff;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <div class="status-bar">
        <div class="ability-panel">
            <div class="ability-slot">
                <span class="ability-key">1</span>
                <span class="ability-name" id="abilityName">ROCKET</span>
                <div class="cooldown-bar"><div class="cooldown-fill" id="cooldownFill" style="width:100%"></div></div>
            </div>
        </div>
        <div style="display: flex; gap: 20px;">
            <span>💥 P1: WASD + SPACE</span>
            <span>🤖 AI: BOPL-BOT</span>
        </div>
        <button class="restart-btn" id="restartButton">↻ RESTART</button>
    </div>
</div>

<!-- Start / Win overlays (inside container relative) -->
<div style="position: relative; width: 0; height: 0;">
    <div id="startScreen" class="start-screen" style="display: flex; flex-direction: column; align-items: center;">
        <h1>MINI BOPL</h1>
        <div style="font-size: 1.5rem; margin-bottom: 20px;">⚡ chaotic blob brawler ⚡</div>
        <div class="controls-hint">
            <div>←→ A / D &nbsp;&nbsp;|&nbsp; JUMP: W &nbsp;&nbsp;|&nbsp; ABILITY: SPACE</div>
            <div style="margin-top: 10px;">🔹 1-4: switch ability &nbsp;|&nbsp; Push enemies off!</div>
        </div>
        <button class="restart-btn" id="startBtn" style="font-size: 2rem; padding: 16px 48px;">▶ PLAY</button>
        <div style="margin-top: 24px; opacity: 0.8;">🤖 AI opponent · last blob wins</div>
    </div>

    <div id="winScreen" class="win-screen" style="display: none;">
        <h2 id="winMessage" style="font-size: 3rem; color:#ffde9e;">VICTORY</h2>
        <button class="restart-btn" id="winRestartBtn" style="margin-top: 30px;">🏆 PLAY AGAIN</button>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ----- CANVAS & CONTEXT -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI elements
        const startScreen = document.getElementById('startScreen');
        const winScreen = document.getElementById('winScreen');
        const winMessage = document.getElementById('winMessage');
        const abilityNameSpan = document.getElementById('abilityName');
        const cooldownFill = document.getElementById('cooldownFill');

        // Buttons
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartButton');
        const winRestartBtn = document.getElementById('winRestartBtn');

        // ----- GAME STATE -----
        let gameState = 'start'; // 'start', 'playing', 'gameover'
        let players = [];
        let platforms = [];
        let particles = [];
        let screenShake = 0;
        
        // ability names
        const ABILITIES = ['ROCKET', 'GROW', 'SHRINK', 'EXPLOSION'];
        
        // Physics constants
        const GRAVITY = 0.45;
        const FRICTION_AIR = 0.986;
        const FRICTION_GROUND = 0.88;
        const BOUNCE = 0.45;
        const WALL_BOUNCE = 0.5;
        
        // Player defaults
        const PLAYER_RADIUS = 22;
        const AI_RADIUS = 22;
        
        // Map boundaries (walls)
        const MIN_X = 40;
        const MAX_X = 960;
        const DEATH_Y = 680;  // below canvas = death
        
        // ----- CLASSES -----
        class Player {
            constructor(x, y, radius, color, isAI = false) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = radius;
                this.baseRadius = radius;
                this.color = color;
                this.isAI = isAI;
                this.mass = 1.0;
                this.facing = 1; // 1 = right, -1 = left
                
                // Movement
                this.speed = 3.8;
                this.jumpForce = -8.5;
                this.grounded = false;
                
                // Ability
                this.currentAbility = 0; // index 0-3
                this.cooldown = 0;
                this.cooldownMax = 0;
                this.abilityTimer = 0; // for temporary effects
                
                // Modifiers
                this.sizeModifier = 1.0;  // for grow/shrink
                this.speedMultiplier = 1.0;
                this.growTimer = 0;
                this.shrinkTimer = 0;
                
                // AI
                this.aiJumpCooldown = 0;
                this.aiDecisionTimer = 0;
            }
            
            applyGravity() {
                this.vy += GRAVITY;
            }
            
            applyFriction() {
                if (this.grounded) {
                    this.vx *= FRICTION_GROUND;
                } else {
                    this.vx *= FRICTION_AIR;
                }
            }
            
            updateTimers() {
                if (this.cooldown > 0) this.cooldown -= 1;
                if (this.growTimer > 0) {
                    this.growTimer--;
                    this.radius = this.baseRadius * 1.6;
                    this.mass = 2.0;
                    if (this.growTimer <= 0) {
                        this.radius = this.baseRadius;
                        this.mass = 1.0;
                    }
                }
                if (this.shrinkTimer > 0) {
                    this.shrinkTimer--;
                    this.radius = this.baseRadius * 0.65;
                    this.mass = 0.7;
                    this.speedMultiplier = 1.5;
                    if (this.shrinkTimer <= 0) {
                        this.radius = this.baseRadius;
                        this.mass = 1.0;
                        this.speedMultiplier = 1.0;
                    }
                }
                // reset speed mult if no shrink
                if (this.shrinkTimer <= 0) this.speedMultiplier = 1.0;
            }
            
            // ability activation
            useAbility() {
                if (this.cooldown > 0) return false;
                
                const ability = ABILITIES[this.currentAbility];
                let cooldownTime = 0;
                
                switch(ability) {
                    case 'ROCKET':
                        this.vx += this.facing * 14;
                        this.vy -= 3.5;
                        cooldownTime = 70;
                        this._spawnRocketParticles();
                        break;
                    case 'GROW':
                        this.growTimer = 90;
                        cooldownTime = 150;
                        break;
                    case 'SHRINK':
                        this.shrinkTimer = 120;
                        cooldownTime = 140;
                        break;
                    case 'EXPLOSION':
                        this._applyExplosion();
                        cooldownTime = 120;
                        screenShake = 10;
                        break;
                }
                this.cooldown = cooldownTime;
                this.cooldownMax = cooldownTime;
                return true;
            }
            
            _applyExplosion() {
                const centerX = this.x;
                const centerY = this.y;
                const force = 18;
                const radius = 130;
                
                // push other players
                players.forEach(p => {
                    if (p === this) return;
                    const dx = p.x - centerX;
                    const dy = p.y - centerY;
                    const dist = Math.hypot(dx, dy);
                    if (dist < radius && dist > 5) {
                        const angle = Math.atan2(dy, dx);
                        const power = force * (1 - dist/radius) * (1 / (p.mass || 1));
                        p.vx += Math.cos(angle) * power;
                        p.vy += Math.sin(angle) * power - 1.5;
                    }
                });
                
                // particles
                for(let i=0; i<18; i++) {
                    particles.push(new Particle(
                        this.x, this.y,
                        (Math.random()-0.5)*12, (Math.random()-0.5)*10 - 3,
                        '#ff884d', 25, 0.92
                    ));
                }
                screenShake = 12;
            }
            
            _spawnRocketParticles() {
                for(let i=0; i<6; i++) {
                    particles.push(new Particle(
                        this.x - this.facing*8, this.y-4,
                        -this.facing * (6+Math.random()*8), (Math.random()-0.5)*4,
                        '#f9d77e', 20, 0.94
                    ));
                }
            }
            
            // AI behavior
            updateAI(target) {
                if (!target) return;
                this.aiDecisionTimer++;
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.hypot(dx, dy);
                
                // move toward player
                if (Math.abs(dx) > 30) {
                    this.facing = dx > 0 ? 1 : -1;
                    this.vx += this.facing * this.speed * this.speedMultiplier * 0.45;
                }
                
                // jump logic
                if (this.grounded) {
                    if (this.aiJumpCooldown <= 0) {
                        // jump if player is above or to cross gap
                        if (target.y < this.y - 30 || (Math.abs(dx) > 90 && this.y > target.y + 20)) {
                            this.vy = this.jumpForce;
                            this.grounded = false;
                            this.aiJumpCooldown = 25;
                        }
                        // also jump randomly for chaos
                        if (Math.random() < 0.02) {
                            this.vy = this.jumpForce * 0.9;
                            this.grounded = false;
                            this.aiJumpCooldown = 20;
                        }
                    } else {
                        this.aiJumpCooldown--;
                    }
                }
                
                // ability usage (chaotic)
                if (this.cooldown <= 0 && this.aiDecisionTimer % 15 === 0 && Math.random() < 0.2) {
                    // switch ability sometimes
                    if (Math.random() < 0.3) this.currentAbility = Math.floor(Math.random()*4);
                    this.useAbility();
                }
                
                // limit speed
                const maxSpeed = 7.5 * this.speedMultiplier;
                if (Math.abs(this.vx) > maxSpeed) this.vx = Math.sign(this.vx) * maxSpeed;
            }
        }

        class Platform {
            constructor(x, y, w, h) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, life, decay=0.96) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.decay = decay;
                this.size = 4 + Math.random()*8;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.vx *= this.decay;
                this.vy *= this.decay;
                this.life -= 1;
                return this.life > 0;
            }
        }

        // ----- INITIALIZE MAP -----
        function buildMap() {
            platforms = [
                new Platform(0, 560, 1000, 30),   // ground
                new Platform(150, 420, 160, 18),
                new Platform(650, 350, 200, 18),
                new Platform(400, 230, 140, 18),
                new Platform(30, 300, 100, 16)
            ];
        }

        function resetGame() {
            buildMap();
            players = [
                new Player(200, 400, PLAYER_RADIUS, '#6ef0b0', false), // P1
                new Player(750, 400, AI_RADIUS, '#ff7b7b', true)       // AI
            ];
            // AI facing
            players[1].facing = -1;
            players[0].facing = 1;
            particles = [];
            screenShake = 0;
            
            // set default ability display
            updateAbilityUI(players[0]);
        }

        // ----- UI Helpers -----
        function updateAbilityUI(player) {
            if (!player) return;
            abilityNameSpan.textContent = ABILITIES[player.currentAbility];
            const cdPercent = player.cooldownMax > 0 ? (player.cooldown / player.cooldownMax) : 1;
            cooldownFill.style.width = Math.max(0, cdPercent * 100) + '%';
            cooldownFill.style.background = cdPercent >= 0.99 ? '#6ef0b0' : '#ffaa66';
        }

        // ----- COLLISION & PHYSICS -----
        function handleCollisions() {
            // Player vs platforms
            for (let p of players) {
                p.grounded = false;
                for (let pl of platforms) {
                    const closestX = Math.max(pl.x, Math.min(p.x, pl.x + pl.w));
                    const closestY = Math.max(pl.y, Math.min(p.y, pl.y + pl.h));
                    const dx = p.x - closestX;
                    const dy = p.y - closestY;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < p.radius) {
                        const overlap = p.radius - dist;
                        const angle = Math.atan2(dy, dx);
                        const pushX = Math.cos(angle) * overlap;
                        const pushY = Math.sin(angle) * overlap;
                        
                        p.x += pushX;
                        p.y += pushY;
                        
                        // collision response
                        if (Math.abs(dy) > Math.abs(dx)) {
                            p.vy = -p.vy * BOUNCE;
                            if (dy > 0) p.grounded = true;
                        } else {
                            p.vx = -p.vx * WALL_BOUNCE;
                        }
                        
                        // friction on ground
                        if (p.grounded) p.vx *= 0.92;
                    }
                }
            }
            
            // Player vs Player (bouncy collisions)
            for (let i=0; i<players.length; i++) {
                for (let j=i+1; j<players.length; j++) {
                    const a = players[i], b = players[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = a.radius + b.radius;
                    if (dist < minDist) {
                        const angle = Math.atan2(dy, dx);
                        const overlap = minDist - dist;
                        const pushX = Math.cos(angle) * overlap * 0.55;
                        const pushY = Math.sin(angle) * overlap * 0.55;
                        
                        // mass factor
                        const totalMass = a.mass + b.mass;
                        const aRatio = b.mass / totalMass;
                        const bRatio = a.mass / totalMass;
                        
                        a.x += pushX * aRatio;
                        a.y += pushY * aRatio;
                        b.x -= pushX * bRatio;
                        b.y -= pushY * bRatio;
                        
                        // bounce velocities
                        const relVelX = a.vx - b.vx;
                        const relVelY = a.vy - b.vy;
                        const dot = relVelX * Math.cos(angle) + relVelY * Math.sin(angle);
                        if (dot < 0) {
                            const impulse = (2 * dot) / totalMass;
                            a.vx -= impulse * b.mass * Math.cos(angle) * 0.7;
                            a.vy -= impulse * b.mass * Math.sin(angle) * 0.7;
                            b.vx += impulse * a.mass * Math.cos(angle) * 0.7;
                            b.vy += impulse * a.mass * Math.sin(angle) * 0.7;
                        }
                    }
                }
            }
            
            // Boundaries (walls)
            players.forEach(p => {
                if (p.x - p.radius < MIN_X) { p.x = MIN_X + p.radius; p.vx = -p.vx * 0.5; }
                if (p.x + p.radius > MAX_X) { p.x = MAX_X - p.radius; p.vx = -p.vx * 0.5; }
                // ceiling
                if (p.y - p.radius < 20) { p.y = 20 + p.radius; p.vy = Math.abs(p.vy)*0.3; }
            });
        }

        function checkDeaths() {
            const alive = players.filter(p => p.y - p.radius < DEATH_Y);
            if (alive.length < players.length) {
                // spawn death particles
                players.filter(p => p.y - p.radius >= DEATH_Y).forEach(p => {
                    for(let i=0;i<12;i++) particles.push(new Particle(p.x, p.y, (Math.random()-0.5)*8, -5+Math.random()*8, p.color, 30));
                });
                players = alive;
            }
            return players.length;
        }

        // ----- UPDATE -----
        function update() {
            if (gameState !== 'playing') return;
            
            // AI update
            const human = players.find(p => !p.isAI);
            players.forEach(p => {
                if (p.isAI) p.updateAI(human);
                p.applyGravity();
                p.applyFriction();
                p.updateTimers();
                
                // velocity integration
                p.x += p.vx;
                p.y += p.vy;
            });
            
            handleCollisions();
            
            const aliveCount = checkDeaths();
            if (aliveCount <= 1) {
                gameState = 'gameover';
                const winner = players[0];
                winMessage.textContent = winner && !winner.isAI ? '🏆 YOU WIN! 🏆' : '💀 BOPL-BOT WINS 💀';
                winScreen.style.display = 'flex';
            }
            
            // particles
            particles = particles.filter(p => p.update());
            
            // screen shake decay
            if (screenShake > 0) screenShake *= 0.82;
            if (screenShake < 0.2) screenShake = 0;
            
            // update UI cooldown for human
            if (players.some(p=>!p.isAI)) {
                updateAbilityUI(players.find(p=>!p.isAI));
            }
        }

        // ----- DRAW -----
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // apply screen shake
            ctx.save();
            if (screenShake > 0.5) {
                const dx = (Math.random() - 0.5) * screenShake * 2;
                const dy = (Math.random() - 0.5) * screenShake * 2;
                ctx.translate(dx, dy);
            }
            
            // Platforms
            ctx.shadowColor = '#00000070';
            ctx.shadowBlur = 12;
            platforms.forEach(p => {
                ctx.fillStyle = '#4a6188';
                ctx.beginPath();
                ctx.roundRect(p.x, p.y, p.w, p.h, 12);
                ctx.fill();
                ctx.fillStyle = '#6a8bb0';
                ctx.beginPath();
                ctx.roundRect(p.x+3, p.y-2, p.w-6, 6, 4);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife * 0.9;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            
            // Players (blobs)
            players.forEach(p => {
                // blob with eyes
                ctx.shadowColor = '#000000aa';
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, 2*Math.PI);
                const gradient = ctx.createRadialGradient(p.x-6, p.y-6, 3, p.x, p.y, p.radius+4);
                gradient.addColorStop(0, p.color);
                gradient.addColorStop(1, shadeColor(p.color, -20));
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.shadowBlur = 8;
                ctx.strokeStyle = '#ffffff30';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // eyes
                ctx.shadowBlur = 0;
                ctx.beginPath();
                const eyeX = p.facing * 8;
                ctx.arc(p.x + eyeX, p.y-4, 7, 0, Math.PI*2);
                ctx.fillStyle = '#fefefe';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x + eyeX + p.facing*3, p.y-7, 4, 0, Math.PI*2);
                ctx.fillStyle = '#1a1f2f';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x + eyeX + p.facing*5, p.y-9, 2, 0, Math.PI*2);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                // ability indicator (small icon)
                if (!p.isAI) {
                    ctx.font = 'bold 16px "Segoe UI"';
                    ctx.fillStyle = '#fff9e0';
                    ctx.shadowColor = 'black';
                    ctx.shadowBlur = 8;
                    ctx.fillText('⚡', p.x-10, p.y - p.radius - 12);
                }
            });
            
            ctx.restore();
            
            // Draw cooldown text near player if needed? Already in UI bar.
        }

        function shadeColor(col, percent) {
            let R = parseInt(col.substring(1,3),16);
            let G = parseInt(col.substring(3,5),16);
            let B = parseInt(col.substring(5,7),16);
            R = Math.min(255, Math.max(0, R + percent));
            G = Math.min(255, Math.max(0, G + percent));
            B = Math.min(255, Math.max(0, B + percent));
            return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
        }

        // Add roundRect
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // ----- GAME LOOP -----
        function gameLoop() {
            if (gameState === 'playing') {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ----- INPUT HANDLING -----
        const keys = {};
        window.addEventListener('keydown', (e) => {
            const key = e.code;
            if (gameState === 'playing') {
                const human = players.find(p => !p.isAI);
                if (human) {
                    // movement
                    if (key === 'KeyA') { human.vx -= human.speed * human.speedMultiplier * 0.8; human.facing = -1; }
                    if (key === 'KeyD') { human.vx += human.speed * human.speedMultiplier * 0.8; human.facing = 1; }
                    if (key === 'KeyW' && human.grounded) {
                        human.vy = human.jumpForce;
                        human.grounded = false;
                    }
                    // ability
                    if (key === 'Space') {
                        e.preventDefault();
                        human.useAbility();
                    }
                    // switch ability
                    if (key === 'Digit1') human.currentAbility = 0;
                    if (key === 'Digit2') human.currentAbility = 1;
                    if (key === 'Digit3') human.currentAbility = 2;
                    if (key === 'Digit4') human.currentAbility = 3;
                    updateAbilityUI(human);
                }
            }
            // prevent page scroll with arrows / space
            if (["Space","KeyW","KeyA","KeyD","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(key)) {
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => { /* not needed for simple */ });

        // restart function
        function startGame() {
            resetGame();
            gameState = 'playing';
            startScreen.style.display = 'none';
            winScreen.style.display = 'none';
            screenShake = 0;
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            resetGame();
            gameState = 'playing';
            winScreen.style.display = 'none';
            startScreen.style.display = 'none';
        });
        winRestartBtn.addEventListener('click', () => {
            resetGame();
            gameState = 'playing';
            winScreen.style.display = 'none';
        });

        // initial reset
        resetGame();
        gameState = 'start';
        startScreen.style.display = 'flex';
        
        // start loop
        gameLoop();
        
        // prevent context menu
        canvas.addEventListener('contextmenu', e => e.preventDefault());
    })();
</script>
