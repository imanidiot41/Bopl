<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BOPL BATTLE LITE · Mobile</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0b1a1f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: pan-y; 
    }
    .game-container {
      background: #1a2e35;
      border-radius: 32px;
      padding: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      max-width: 480px;
      width: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1/1;
      background: radial-gradient(circle at 20% 20%, #4b7b8c, #1e4a5f);
      border-radius: 24px;
      box-shadow: inset 0 0 20px #00000055, 0 8px 0 #0e1c22;
      touch-action: none;  /* prevent scrolling while touching canvas */
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 8px;
    }
    .arrow-panel {
      display: flex;
      gap: 12px;
      background: #1f3a42;
      padding: 10px 16px;
      border-radius: 60px;
      box-shadow: inset 0 2px 5px #0a171c, 0 5px 0 #0c1e24;
    }
    .ctrl-btn {
      background: #3b6b7a;
      border: none;
      width: 70px;
      height: 70px;
      border-radius: 50px;
      font-size: 36px;
      font-weight: bold;
      color: #e7f6fd;
      text-shadow: 0 2px 0 #14323b;
      box-shadow: 0 6px 0 #1d3f4b, 0 8px 12px black;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.05s;
      user-select: none;
    }
    .ctrl-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #1d3f4b, 0 5px 8px black;
    }
    .ability-panel {
      display: flex;
      gap: 8px;
      background: #1f3a42;
      padding: 8px 14px;
      border-radius: 60px;
      box-shadow: inset 0 2px 5px #0a171c, 0 5px 0 #0c1e24;
      flex: 2;
      justify-content: space-evenly;
    }
    .ability-btn {
      background: #4f2e5e;
      width: 75px;
      height: 75px;
      border-radius: 50px;
      box-shadow: 0 6px 0 #2e1a38, 0 8px 12px black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f3daff;
      font-weight: bold;
      font-size: 18px;
      position: relative;
      cursor: pointer;
      touch-action: manipulation;
      transition: 0.05s;
      border: 2px solid #9f7eb3;
    }
    .ability-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #2e1a38, 0 5px 8px black;
    }
    .ability-btn .key {
      font-size: 22px;
      line-height: 1.2;
    }
    .cooldown-overlay {
      position: absolute;
      bottom: 4px;
      left: 4px;
      right: 4px;
      height: 6px;
      background: #1e1025;
      border-radius: 10px;
      overflow: hidden;
    }
    .cooldown-fill {
      height: 100%;
      width: 0%;
      background: #f5cb5c;
      border-radius: 10px;
      transition: width 0.05s linear;
    }
    .jump-btn {
      background: #5d7a5c;
      box-shadow: 0 6px 0 #2f412e, 0 8px 12px black;
    }
    .reset-area {
      display: flex;
      justify-content: center;
      margin: 8px 0 4px;
    }
    .reset-btn {
      background: #6a4e3a;
      border: none;
      color: #f0e2d4;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 5px 0 #3e2e22, 0 5px 8px black;
      cursor: pointer;
      touch-action: manipulation;
    }
    .reset-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #3e2e22, 0 4px 6px black;
    }
    .status {
      color: #bfd9e6;
      text-align: center;
      margin: 5px 0;
      font-weight: bold;
      font-size: 18px;
      text-shadow: 0 2px 3px black;
    }
    /* aiming arrow (drawn on canvas overlay) handled in JS */
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <div class="status" id="gameStatus">⚔️ 3 BOTS REMAIN ⚔️</div>
  <div class="controls">
    <div class="arrow-panel">
      <button class="ctrl-btn" id="leftBtn">←</button>
      <button class="ctrl-btn" id="rightBtn">→</button>
    </div>
    <button class="ctrl-btn jump-btn" id="jumpBtn">↑</button>
    <div class="ability-panel">
      <!-- Dash -->
      <div class="ability-btn" id="dashBtn">
        <span class="key">💨</span>
        <span style="font-size: 13px;">DASH</span>
        <div class="cooldown-overlay"><div class="cooldown-fill" id="dashCdFill"></div></div>
      </div>
      <!-- Grenade -->
      <div class="ability-btn" id="grenadeBtn">
        <span class="key">💣</span>
        <span style="font-size: 13px;">GRENADE</span>
        <div class="cooldown-overlay"><div class="cooldown-fill" id="grenadeCdFill"></div></div>
      </div>
      <!-- Rock -->
      <div class="ability-btn" id="rockBtn">
        <span class="key">🪨</span>
        <span style="font-size: 13px;">ROCK</span>
        <div class="cooldown-overlay"><div class="cooldown-fill" id="rockCdFill"></div></div>
      </div>
    </div>
  </div>
  <div class="reset-area">
    <button class="reset-btn" id="resetBtn">⟳ NEW BATTLE</button>
  </div>
</div>
<script>
  (function(){
    "use strict";

    // ---------- CANVAS & SETUP ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('gameStatus');
    
    // world dimensions (600x600)
    const W = 600, H = 600;
    canvas.width = W; canvas.height = H;
    
    // Game state
    let gameActive = true;
    let winnerDeclared = false;
    
    // ---------- PHYSICS PARAMS ----------
    const GRAVITY = 0.45;
    const JUMP_FORCE = -8.0;
    const WALK_ACCEL = 1.0;
    const MAX_WALK_SPEED = 4.2;
    const FRICTION_AIR = 0.88;
    const FRICTION_GROUND = 0.78;
    const BOUNCE = 0.25;  // slight bounce on collisions
    
    // ---------- PLATFORMS (bopl style simple arena) ----------
    const platforms = [
      // ground
      { x: 0, y: 550, w: 600, h: 20 },
      // mid left
      { x: 30, y: 380, w: 140, h: 20 },
      // mid right
      { x: 430, y: 380, w: 140, h: 20 },
      // top center
      { x: 200, y: 220, w: 200, h: 18 },
      // small floating
      { x: 90, y: 140, w: 80, h: 16 },
      { x: 420, y: 120, w: 90, h: 16 },
    ];
    
    // ---------- SLIME CLASS ----------
    class Slime {
      constructor(x, y, color, isPlayer = false) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.r = 18;          // base radius
        this.color = color;
        this.isPlayer = isPlayer;
        this.facing = 1;       // 1 = right, -1 = left
        this.onGround = false;
        
        // abilities
        this.abilities = {
          dash: { cooldown: 0, maxCd: 90 },      // frames
          grenade: { cooldown: 0, maxCd: 150 },
          rock: { cooldown: 0, maxCd: 240, active: false, timer: 0 }
        };
        this.rockSpeedBoost = 1.8;
        this.invincible = false;  // rock form
        
        // grenade cooking
        this.cookingGrenade = false;
        this.grenadeCookTimer = 0;
        this.cookMax = 180; // 3 sec at 60fps
        
        // dash aiming
        this.aimingDash = false;
        this.aimingGrenade = false;
        this.aimDirection = { x: 1, y: 0 }; // normalized
        
        // AI
        this.aiState = 'chase'; // chase, attack
        this.aiTarget = null;
        this.aiDecisionTimer = 0;
      }
      
      // apply cooldowns each frame
      updateCooldowns() {
        for (let key in this.abilities) {
          if (this.abilities[key].cooldown > 0) this.abilities[key].cooldown--;
        }
        if (this.abilities.rock.active) {
          this.abilities.rock.timer--;
          if (this.abilities.rock.timer <= 0) {
            this.abilities.rock.active = false;
            this.invincible = false;
          }
        }
      }
      
      // check ability ready
      canUse(ability) {
        if (ability === 'rock' && this.abilities.rock.active) return false;
        return this.abilities[ability].cooldown <= 0;
      }
      
      // use ability (called by player or bot)
      useDash(directionVec) {
        if (!this.canUse('dash')) return false;
        const power = 12.0;
        this.vx += directionVec.x * power;
        this.vy += directionVec.y * power * 0.7; // less vertical
        this.abilities.dash.cooldown = this.abilities.dash.maxCd;
        return true;
      }
      
      startCookGrenade() {
        if (!this.canUse('grenade')) return false;
        this.cookingGrenade = true;
        this.grenadeCookTimer = 0;
        return true;
      }
      
      throwGrenade(directionVec, powerMult = 1.0) {
        if (!this.cookingGrenade) return null;
        this.cookingGrenade = false;
        this.abilities.grenade.cooldown = this.abilities.grenade.maxCd;
        const speed = 7.5 * powerMult;
        const g = new Grenade(
          this.x + directionVec.x * (this.r+5),
          this.y + directionVec.y * (this.r+5),
          directionVec.x * speed,
          directionVec.y * speed,
          this
        );
        this.grenadeCookTimer = 0;
        return g;
      }
      
      activateRock() {
        if (!this.canUse('rock')) return false;
        this.abilities.rock.active = true;
        this.abilities.rock.timer = 180; // 3 sec (60fps)
        this.abilities.rock.cooldown = this.abilities.rock.maxCd;
        this.invincible = true;
        return true;
      }
      
      // collision & movement handled in game loop
    }
    
    // Grenade class
    class Grenade {
      constructor(x, y, vx, vy, owner) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.r = 8;
        this.owner = owner;
        this.timer = 150; // auto explode after 2.5 sec
        this.exploded = false;
        this.explosionForce = 14;
      }
      update(platforms, slimes) {
        if (this.exploded) return;
        this.timer--;
        this.vy += GRAVITY * 0.5;
        this.x += this.vx;
        this.y += this.vy;
        
        // platform collision
        for (let p of platforms) {
          if (this.x + this.r > p.x && this.x - this.r < p.x + p.w &&
              this.y + this.r > p.y && this.y - this.r < p.y + p.h) {
            // bounce
            if (this.y + this.r > p.y && this.vy > 0) { this.y = p.y - this.r; this.vy *= -BOUNCE; }
            else if (this.y - this.r < p.y + p.h && this.vy < 0) { this.y = p.y + p.h + this.r; this.vy *= -BOUNCE; }
            if (this.x + this.r > p.x && this.vx > 0) { this.x = p.x - this.r; this.vx *= -BOUNCE; }
            else if (this.x - this.r < p.x + p.w && this.vx < 0) { this.x = p.x + p.w + this.r; this.vx *= -BOUNCE; }
          }
        }
        if (this.timer <= 0) this.explode(slimes);
        // boundaries
        if (this.x < -20 || this.x > W+20 || this.y > H+50) this.exploded = true;
      }
      explodesOnImpact(slime) {
        if (this.exploded) return;
        this.explode(slimes);
      }
      explodes(slimes) {
        this.exploded = true;
        // knockback nearby slimes
        for (let s of slimes) {
          if (s === this.owner && !s.isPlayer) continue; // bots avoid self? but can hit
          let dx = s.x - this.x;
          let dy = s.y - this.y;
          let dist = Math.hypot(dx, dy);
          if (dist < 70) {
            let force = (1 - dist/70) * this.explosionForce;
            let angle = Math.atan2(dy, dx);
            s.vx += Math.cos(angle) * force;
            s.vy += Math.sin(angle) * force * 0.8 - 3;
          }
        }
      }
    }
    
    // ---------- GAME STATE ----------
    let slimes = [];
    let grenades = [];
    let player;
    let bots = [];
    let frame = 0;
    let gameOver = false;
    
    // Input state
    const keys = {
      left: false, right: false, jump: false
    };
    
    // aiming drag state (touch)
    let dragActive = false;
    let dragType = null; // 'dash' or 'grenade'
    let dragStart = { x: 0, y: 0 };
    let dragCurrent = { x: 0, y: 0 };
    
    // UI elements
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const jumpBtn = document.getElementById('jumpBtn');
    const dashBtn = document.getElementById('dashBtn');
    const grenadeBtn = document.getElementById('grenadeBtn');
    const rockBtn = document.getElementById('rockBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    const dashCdFill = document.getElementById('dashCdFill');
    const grenadeCdFill = document.getElementById('grenadeCdFill');
    const rockCdFill = document.getElementById('rockCdFill');
    
    // ----- helper: reset game -----
    function resetGame() {
      gameActive = true;
      winnerDeclared = false;
      gameOver = false;
      grenades = [];
      dragActive = false;
      
      slimes = [];
      // player (blue)
      player = new Slime(150, 400, '#3d93e0', true);
      slimes.push(player);
      
      // bots (red, green, yellow)
      const botColors = ['#e05a5a', '#6fbf4c', '#e0c35a'];
      bots = [];
      for (let i=0; i<3; i++) {
        let bot = new Slime(300 + i*70, 400, botColors[i], false);
        bots.push(bot);
        slimes.push(bot);
      }
      statusDiv.innerText = '⚔️ 3 BOTS REMAIN ⚔️';
    }
    
    // ---------- PHYSICS & COLLISION ----------
    function handleSlimeCollision(s) {
      // platform collision
      s.onGround = false;
      for (let p of platforms) {
        let dx = s.x - Math.max(p.x, Math.min(s.x, p.x + p.w));
        let dy = s.y - Math.max(p.y, Math.min(s.y, p.y + p.h));
        if (Math.abs(dx) < s.r && Math.abs(dy) < s.r) {
          // collision response
          let overlapX = s.r - Math.abs(dx);
          let overlapY = s.r - Math.abs(dy);
          if (overlapX < overlapY) {
            s.x += dx > 0 ? overlapX : -overlapX;
            s.vx *= -0.3;
          } else {
            s.y += dy > 0 ? overlapY : -overlapY;
            if (dy > 0) { s.vy = 0; s.onGround = true; }
            else s.vy *= -0.2;
          }
        }
      }
      // boundaries
      if (s.x - s.r < 0) { s.x = s.r; s.vx *= -0.3; }
      if (s.x + s.r > W) { s.x = W - s.r; s.vx *= -0.3; }
      if (s.y + s.r > H) { s.y = H - s.r; s.vy = 0; s.onGround = true; }
      if (s.y - s.r < 0) { s.y = s.r; s.vy *= -0.3; }
      
      // kill if fallen off
      if (s.y > H + 40) {
        s.hp = 0; // mark dead
      }
    }
    
    function applyPhysics() {
      for (let s of slimes) {
        if (s.abilities.rock.active) {
          // rock physics: faster, less gravity
          s.vy += GRAVITY * 0.35;
          s.vx *= 0.99;
          s.vy *= 0.99;
        } else {
          s.vy += GRAVITY;
          s.vx *= FRICTION_AIR;
        }
        s.x += s.vx;
        s.y += s.vy;
        handleSlimeCollision(s);
        
        // facing
        if (Math.abs(s.vx) > 0.2) s.facing = s.vx > 0 ? 1 : -1;
      }
      
      // slime vs slime collision (push apart)
      for (let i=0; i<slimes.length; i++) {
        for (let j=i+1; j<slimes.length; j++) {
          let a = slimes[i], b = slimes[j];
          let dx = a.x - b.x, dy = a.y - b.y;
          let dist = Math.hypot(dx, dy);
          let minDist = a.r + b.r;
          if (dist < minDist) {
            let angle = Math.atan2(dy, dx);
            let overlap = minDist - dist;
            let pushX = Math.cos(angle) * overlap * 0.5;
            let pushY = Math.sin(angle) * overlap * 0.5;
            a.x += pushX; b.x -= pushX;
            a.y += pushY; b.y -= pushY;
          }
          // rock kill
          if (a.abilities.rock.active && !b.invincible) { b.hp = 0; }
          if (b.abilities.rock.active && !a.invincible) { a.hp = 0; }
        }
      }
      
      // remove dead slimes
      slimes = slimes.filter(s => {
        if (s.hp === 0) return false;
        if (s.y > H+50) return false;
        return true;
      });
      
      // update grenades
      for (let g of grenades) {
        g.update(platforms, slimes);
        // collision with slimes
        for (let s of slimes) {
          if (s === g.owner && g.timer > 10) continue; // brief immunity
          let dx = s.x - g.x, dy = s.y - g.y;
          if (Math.hypot(dx, dy) < s.r + g.r) {
            g.explode(slimes);
            break;
          }
        }
      }
      grenades = grenades.filter(g => !g.exploded);
    }
    
    // ---------- AI ----------
    function updateBots() {
      for (let bot of bots) {
        if (!slimes.includes(bot)) continue;
        bot.updateCooldowns();
        
        // find nearest enemy
        let enemies = slimes.filter(s => s !== bot);
        if (enemies.length === 0) continue;
        let target = enemies.reduce((a,b) => 
          (Math.hypot(a.x-bot.x, a.y-bot.y) < Math.hypot(b.x-bot.x, b.y-bot.y)) ? a : b
        );
        
        // simple movement
        let dx = target.x - bot.x;
        if (bot.onGround) {
          if (Math.abs(dx) > 40) bot.vx += (dx > 0 ? 0.7 : -0.7);
        }
        // jump if below target or obstacle
        if (bot.onGround && (target.y < bot.y - 20 || Math.random()<0.02)) {
          bot.vy = JUMP_FORCE * 0.9;
        }
        
        // abilities (simulate swipe imperfect)
        if (bot.canUse('dash') && Math.hypot(dx, target.y-bot.y) < 130) {
          let dir = { x: dx, y: (target.y - bot.y) * 0.3 };
          let len = Math.hypot(dir.x, dir.y) || 1;
          bot.useDash({ x: dir.x/len + (Math.random()-0.5)*0.4, y: dir.y/len });
        }
        if (bot.canUse('grenade') && Math.random()<0.02) {
          bot.startCookGrenade();
          bot.cookingGrenade = true;
          setTimeout(() => { // simulate cook then throw
            if (bot.cookingGrenade && slimes.includes(bot)) {
              let dir = { x: target.x - bot.x, y: target.y - bot.y };
              let len = Math.hypot(dir.x, dir.y)||1;
              let g = bot.throwGrenade({ x: dir.x/len+0.2, y: dir.y/len }, 0.9);
              if (g) grenades.push(g);
            }
          }, 40);
        }
        if (bot.canUse('rock') && Math.random()<0.01) {
          bot.activateRock();
        }
      }
    }
    
    // ---------- PLAYER INPUT & ABILITIES ----------
    function handlePlayer() {
      if (!player || !slimes.includes(player)) return;
      player.updateCooldowns();
      
      // movement
      if (keys.left) player.vx -= WALK_ACCEL;
      if (keys.right) player.vx += WALK_ACCEL;
      if (keys.jump && player.onGround) player.vy = JUMP_FORCE;
      
      // limit speed
      let max = player.abilities.rock.active ? MAX_WALK_SPEED*1.8 : MAX_WALK_SPEED;
      player.vx = Math.min(max, Math.max(-max, player.vx));
      if (player.onGround) player.vx *= FRICTION_GROUND;
      
      // cooking grenade
      if (player.cookingGrenade) {
        player.grenadeCookTimer++;
        if (player.grenadeCookTimer >= player.cookMax) {
          // explode in hand!
          let g = new Grenade(player.x, player.y, 0,0, player);
          g.explode(slimes);
          player.cookingGrenade = false;
          player.abilities.grenade.cooldown = player.abilities.grenade.maxCd;
        }
      }
      
      // cooldown UI
      if (player) {
        dashCdFill.style.width = (100 - (player.abilities.dash.cooldown/player.abilities.dash.maxCd)*100) + '%';
        grenadeCdFill.style.width = (100 - (player.abilities.grenade.cooldown/player.abilities.grenade.maxCd)*100) + '%';
        rockCdFill.style.width = (100 - (player.abilities.rock.cooldown/player.abilities.rock.maxCd)*100) + '%';
      }
    }
    
    // ---------- DRAWING (Bopl style squishy) ----------
    function draw() {
      ctx.clearRect(0, 0, W, H);
      // platforms
      ctx.fillStyle = '#5d4e3c';
      ctx.shadowColor = '#1e2a2f';
      ctx.shadowBlur = 8;
      for (let p of platforms) {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#7d6b55';
        ctx.fillRect(p.x+2, p.y-2, p.w-4, 4);
        ctx.fillStyle = '#5d4e3c';
      }
      ctx.shadowBlur = 0;
      
      // grenades
      for (let g of grenades) {
        ctx.beginPath();
        ctx.arc(g.x, g.y, g.r, 0, 2*Math.PI);
        ctx.fillStyle = '#2b2b2b';
        ctx.fill();
        ctx.fillStyle = '#e05a5a';
        ctx.arc(g.x-2, g.y-2, 4, 0, 2*Math.PI);
        ctx.fill();
      }
      
      // slimes (squishy effect)
      for (let s of slimes) {
        let squishX = 1.0, squishY = 1.0;
        if (s.vy > 0.5) squishY = 1.15;
        else if (s.vy < -0.5) squishY = 0.85;
        if (Math.abs(s.vx) > 1) squishX = 1.1;
        
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(squishX * (s.facing || 1), squishY);
        // body
        ctx.beginPath();
        ctx.arc(0, 0, s.r, 0, 2*Math.PI);
        ctx.fillStyle = s.color;
        ctx.shadowColor = '#00000055';
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#ffffff30';
        ctx.lineWidth = 2;
        ctx.stroke();
        // face
        ctx.beginPath();
        ctx.arc(-6, -4, 5, 0.2, 1.8);
        ctx.strokeStyle = '#1a1f2a';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(6, -4, 5, 1.3, 2.9);
        ctx.stroke();
        // eyes
        ctx.fillStyle = '#f5f9ff';
        ctx.beginPath(); ctx.arc(-8, -8, 5, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(8, -8, 5, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = '#1f2c3a';
        ctx.beginPath(); ctx.arc(-9 + s.facing*2, -10, 3, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(7 + s.facing*2, -10, 3, 0, 2*Math.PI); ctx.fill();
        ctx.restore();
        
        // rock indicator
        if (s.abilities.rock.active) {
          ctx.beginPath(); ctx.arc(s.x, s.y-25, 8, 0, 2*Math.PI);
          ctx.fillStyle = '#7a5a3e'; ctx.fill();
        }
      }
      
      // aiming arrow
      if (dragActive && player && slimes.includes(player)) {
        let startX = player.x, startY = player.y;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        let angle = Math.atan2(dragCurrent.y - dragStart.y, dragCurrent.x - dragStart.x);
        let len = Math.min(80, Math.hypot(dragCurrent.x-dragStart.x, dragCurrent.y-dragStart.y));
        let endX = startX + Math.cos(angle)*len;
        let endY = startY + Math.sin(angle)*len;
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = '#f5e56b';
        ctx.lineWidth = 5;
        ctx.shadowBlur = 12;
        ctx.stroke();
        // arrowhead
        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX - 12*Math.cos(angle-0.8), endY - 12*Math.sin(angle-0.8));
        ctx.lineTo(endX - 12*Math.cos(angle+0.8), endY - 12*Math.sin(angle+0.8));
        ctx.closePath();
        ctx.fillStyle = '#f5e56b';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    
    // ---------- GAME LOOP ----------
    function gameLoop() {
      if (!gameActive) { requestAnimationFrame(gameLoop); return; }
      
      if (slimes.includes(player)) handlePlayer();
      updateBots();
      applyPhysics();
      
      // check win
      let alive = slimes.filter(s => s.hp !== 0);
      if (alive.length <= 1 && !gameOver) {
        gameActive = false; gameOver = true;
        if (alive[0] === player) statusDiv.innerText = '🏆 YOU WIN! 🏆';
        else statusDiv.innerText = '💀 GAME OVER 💀';
      } else {
        let botsLeft = slimes.filter(s => !s.isPlayer).length;
        statusDiv.innerText = `⚔️ ${botsLeft} BOTS REMAIN ⚔️`;
      }
      
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // ---------- TOUCH & BUTTON HANDLERS ----------
    function handleAbilityPress(type) {
      if (!player || !slimes.includes(player)) return;
      if (type === 'rock') {
        if (player.canUse('rock')) player.activateRock();
        return;
      }
      // dash / grenade: start drag
      dragActive = true;
      dragType = type;
      dragStart = { x: player.x, y: player.y };
      dragCurrent = { x: player.x + 30, y: player.y };
    }
    
    function handleAbilityRelease() {
      if (!dragActive || !player) { dragActive = false; return; }
      let angle = Math.atan2(dragCurrent.y - dragStart.y, dragCurrent.x - dragStart.x);
      let dir = { x: Math.cos(angle), y: Math.sin(angle) };
      if (dragType === 'dash') {
        if (player.canUse('dash')) player.useDash(dir);
      } else if (dragType === 'grenade') {
        if (player.cookingGrenade) {
          let g = player.throwGrenade(dir, 1.0);
          if (g) grenades.push(g);
        } else {
          if (player.canUse('grenade')) player.startCookGrenade();
        }
      }
      dragActive = false;
    }
    
    // event listeners
    leftBtn.addEventListener('mousedown', (e)=>{ e.preventDefault(); keys.left=true; });
    leftBtn.addEventListener('mouseup', ()=>{ keys.left=false; });
    leftBtn.addEventListener('mouseleave', ()=>{ keys.left=false; });
    rightBtn.addEventListener('mousedown', (e)=>{ e.preventDefault(); keys.right=true; });
    rightBtn.addEventListener('mouseup', ()=>{ keys.right=false; });
    rightBtn.addEventListener('mouseleave', ()=>{ keys.right=false; });
    jumpBtn.addEventListener('mousedown', (e)=>{ e.preventDefault(); keys.jump=true; });
    jumpBtn.addEventListener('mouseup', ()=>{ keys.jump=false; });
    
    // touch events
    leftBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); keys.left=true; });
    leftBtn.addEventListener('touchend', ()=>{ keys.left=false; });
    rightBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); keys.right=true; });
    rightBtn.addEventListener('touchend', ()=>{ keys.right=false; });
    jumpBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); keys.jump=true; });
    jumpBtn.addEventListener('touchend', ()=>{ keys.jump=false; });
    
    dashBtn.addEventListener('mousedown', ()=>handleAbilityPress('dash'));
    grenadeBtn.addEventListener('mousedown', ()=>handleAbilityPress('grenade'));
    rockBtn.addEventListener('mousedown', ()=>handleAbilityPress('rock'));
    
    dashBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleAbilityPress('dash'); });
    grenadeBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleAbilityPress('grenade'); });
    rockBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleAbilityPress('rock'); });
    
    window.addEventListener('mouseup', handleAbilityRelease);
    window.addEventListener('touchend', handleAbilityRelease);
    window.addEventListener('mousemove', (e) => {
      if (dragActive) { dragCurrent = { x: e.clientX, y: e.clientY }; }
    });
    window.addEventListener('touchmove', (e) => {
      if (dragActive) { e.preventDefault(); let touch = e.touches[0]; dragCurrent = { x: touch.clientX, y: touch.clientY }; }
    }, {passive: false});
    
    resetBtn.addEventListener('click', ()=>{
      resetGame();
      gameActive = true;
    });
    
    // start!
    resetGame();
    requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
